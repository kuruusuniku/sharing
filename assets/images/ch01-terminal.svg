<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160">
  <rect width="700" height="160" fill="#f8f7f5" rx="6"/>
  <!-- Terminal window -->
  <g transform="translate(170, 20)">
    <rect width="360" height="120" rx="8" fill="#1e1e2e" stroke="#d8d5ce" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="360" height="28" rx="8" fill="#2d2d3d"/>
    <rect y="20" width="360" height="8" fill="#2d2d3d"/>
    <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
    <circle cx="34" cy="14" r="5" fill="#febc2e"/>
    <circle cx="52" cy="14" r="5" fill="#28c840"/>
    <text x="180" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">Terminal</text>
    <!-- Command lines -->
    <text x="12" y="50" font-family="monospace" font-size="12" fill="#89b4fa">$</text>
    <text x="24" y="50" font-family="monospace" font-size="12" fill="#cdd6f4"> npm install -g @anthropic-ai/claude-code</text>
    <text x="12" y="70" font-family="monospace" font-size="12" fill="#a6e3a1">✓ installed successfully</text>
    <text x="12" y="94" font-family="monospace" font-size="12" fill="#89b4fa">$</text>
    <text x="24" y="94" font-family="monospace" font-size="12" fill="#cdd6f4"> claude</text>
    <text x="12" y="112" font-family="monospace" font-size="12" fill="#f9e2af">Claude Code v1.0 — ready</text>
  </g>
</svg>
