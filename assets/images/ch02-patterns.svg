<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180">
  <rect width="700" height="180" fill="#f8f7f5" rx="6"/>
  <!-- 5 pattern icons -->
  <g transform="translate(70, 30)">
    <!-- 1. Chain -->
    <g transform="translate(0, 0)">
      <rect x="0" y="20" width="40" height="24" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1.5"/>
      <text x="20" y="36" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">LLM</text>
      <line x1="40" y1="32" x2="56" y2="32" stroke="#2b6cb0" stroke-width="1.5" marker-end="url(#arrow)"/>
      <rect x="56" y="20" width="40" height="24" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1.5"/>
      <text x="76" y="36" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">LLM</text>
      <text x="48" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Chain</text>
    </g>
    <!-- 2. Route -->
    <g transform="translate(140, 0)">
      <rect x="20" y="0" width="40" height="20" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1.5"/>
      <text x="40" y="14" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2b6cb0">分類</text>
      <line x1="40" y1="20" x2="10" y2="40" stroke="#999" stroke-width="1"/>
      <line x1="40" y1="20" x2="40" y2="40" stroke="#999" stroke-width="1"/>
      <line x1="40" y1="20" x2="70" y2="40" stroke="#999" stroke-width="1"/>
      <rect x="0" y="40" width="22" height="16" rx="3" fill="#fff3e0" stroke="#c05621" stroke-width="1"/>
      <rect x="29" y="40" width="22" height="16" rx="3" fill="#fff3e0" stroke="#c05621" stroke-width="1"/>
      <rect x="58" y="40" width="22" height="16" rx="3" fill="#fff3e0" stroke="#c05621" stroke-width="1"/>
      <text x="40" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Route</text>
    </g>
    <!-- 3. Parallel -->
    <g transform="translate(280, 0)">
      <rect x="12" y="8" width="20" height="16" rx="3" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
      <rect x="12" y="28" width="20" height="16" rx="3" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
      <rect x="12" y="48" width="20" height="16" rx="3" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
      <line x1="32" y1="16" x2="50" y2="36" stroke="#999" stroke-width="1"/>
      <line x1="32" y1="36" x2="50" y2="36" stroke="#999" stroke-width="1"/>
      <line x1="32" y1="56" x2="50" y2="36" stroke="#999" stroke-width="1"/>
      <rect x="50" y="28" width="24" height="16" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
      <text x="62" y="40" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2e7d32">集約</text>
      <text x="40" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Parallel</text>
    </g>
    <!-- 4. Orchestrator -->
    <g transform="translate(400, 0)">
      <rect x="20" y="0" width="40" height="20" rx="4" fill="#2b6cb0" stroke="none"/>
      <text x="40" y="14" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">指揮</text>
      <line x1="30" y1="20" x2="10" y2="40" stroke="#2b6cb0" stroke-width="1.5"/>
      <line x1="40" y1="20" x2="40" y2="40" stroke="#2b6cb0" stroke-width="1.5"/>
      <line x1="50" y1="20" x2="70" y2="40" stroke="#2b6cb0" stroke-width="1.5"/>
      <rect x="0" y="40" width="22" height="16" rx="3" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
      <rect x="29" y="40" width="22" height="16" rx="3" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
      <rect x="58" y="40" width="22" height="16" rx="3" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
      <text x="40" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Orchestrator</text>
    </g>
    <!-- 5. Evaluator -->
    <g transform="translate(520, 0)">
      <rect x="0" y="16" width="32" height="20" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1.5"/>
      <text x="16" y="30" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2b6cb0">生成</text>
      <line x1="32" y1="26" x2="48" y2="26" stroke="#999" stroke-width="1"/>
      <rect x="48" y="16" width="32" height="20" rx="4" fill="#fff3e0" stroke="#c05621" stroke-width="1.5"/>
      <text x="64" y="30" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#c05621">評価</text>
      <path d="M64 36 C64 52, 16 52, 16 36" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="40" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Evaluator</text>
    </g>
  </g>
  <!-- Bottom label -->
  <text x="350" y="130" text-anchor="middle" font-family="serif" font-size="16" fill="#1a1a1a">Anthropic 公式 5つのワークフローパターン</text>
  <text x="350" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">Building Effective Agents — anthropic.com</text>
</svg>
