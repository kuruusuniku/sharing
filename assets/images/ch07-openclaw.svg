<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180">
  <rect width="700" height="180" fill="#f8f7f5" rx="6"/>
  <!-- Center: OpenClaw -->
  <g transform="translate(280, 20)">
    <rect width="140" height="44" rx="10" fill="#2b6cb0"/>
    <text x="70" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">OpenClaw</text>
    <text x="70" y="35" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aaccff">個人用AIアシスタント</text>
  </g>
  <!-- Chat apps (left) -->
  <g transform="translate(30, 85)">
    <text x="60" y="-8" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999">チャットアプリ</text>
    <rect x="0" y="0" width="50" height="24" rx="5" fill="#25D366" opacity="0.8"/>
    <text x="25" y="16" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">WhatsApp</text>
    <rect x="56" y="0" width="50" height="24" rx="5" fill="#0088cc" opacity="0.8"/>
    <text x="81" y="16" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">Telegram</text>
    <rect x="0" y="30" width="50" height="24" rx="5" fill="#5865F2" opacity="0.8"/>
    <text x="25" y="46" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">Discord</text>
    <rect x="56" y="30" width="50" height="24" rx="5" fill="#4A154B" opacity="0.8"/>
    <text x="81" y="46" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">Slack</text>
  </g>
  <!-- Connection lines left -->
  <line x1="140" y1="100" x2="280" y2="50" stroke="#d8d5ce" stroke-width="1.5"/>
  <!-- Services (right) -->
  <g transform="translate(500, 85)">
    <text x="90" y="-8" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999">連携サービス</text>
    <rect x="0" y="0" width="50" height="24" rx="5" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="25" y="16" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2b6cb0">Gmail</text>
    <rect x="56" y="0" width="50" height="24" rx="5" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="81" y="16" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2b6cb0">GitHub</text>
    <rect x="112" y="0" width="50" height="24" rx="5" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="137" y="16" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2b6cb0">Calendar</text>
    <rect x="0" y="30" width="50" height="24" rx="5" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="25" y="46" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2b6cb0">Obsidian</text>
    <rect x="56" y="30" width="50" height="24" rx="5" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="81" y="46" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2b6cb0">Spotify</text>
    <rect x="112" y="30" width="50" height="24" rx="5" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="137" y="46" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2b6cb0">Hue</text>
  </g>
  <!-- Connection lines right -->
  <line x1="500" y1="100" x2="420" y2="50" stroke="#d8d5ce" stroke-width="1.5"/>
  <!-- LLM backends (bottom center) -->
  <g transform="translate(230, 140)">
    <text x="120" y="-6" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999">LLMバックエンド</text>
    <rect x="0" y="0" width="70" height="24" rx="5" fill="#fff3e0" stroke="#c05621" stroke-width="1"/>
    <text x="35" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c05621">Claude</text>
    <rect x="80" y="0" width="70" height="24" rx="5" fill="#fff3e0" stroke="#c05621" stroke-width="1"/>
    <text x="115" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c05621">GPT</text>
    <rect x="160" y="0" width="70" height="24" rx="5" fill="#fff3e0" stroke="#c05621" stroke-width="1"/>
    <text x="195" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c05621">ローカルLLM</text>
  </g>
  <!-- Connection line bottom -->
  <line x1="350" y1="64" x2="350" y2="134" stroke="#d8d5ce" stroke-width="1.5"/>
</svg>
