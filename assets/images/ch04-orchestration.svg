<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200">
  <rect width="700" height="200" fill="#f8f7f5" rx="6"/>
  <!-- sub-company side -->
  <g transform="translate(40, 15)">
    <text x="150" y="16" text-anchor="middle" font-family="serif" font-size="14" fill="#1a1a1a" font-weight="bold">sub-company</text>
    <!-- User -->
    <rect x="115" y="28" width="70" height="24" rx="5" fill="#fff" stroke="#d8d5ce" stroke-width="1.5"/>
    <text x="150" y="44" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">ユーザー</text>
    <line x1="150" y1="52" x2="150" y2="62" stroke="#999" stroke-width="1"/>
    <!-- Secretary -->
    <rect x="110" y="62" width="80" height="26" rx="5" fill="#2b6cb0"/>
    <text x="150" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">秘書</text>
    <!-- Lines to departments -->
    <line x1="120" y1="88" x2="40" y2="108" stroke="#2b6cb0" stroke-width="1.5"/>
    <line x1="135" y1="88" x2="100" y2="108" stroke="#2b6cb0" stroke-width="1.5"/>
    <line x1="150" y1="88" x2="160" y2="108" stroke="#2b6cb0" stroke-width="1.5"/>
    <line x1="165" y1="88" x2="220" y2="108" stroke="#2b6cb0" stroke-width="1.5"/>
    <line x1="180" y1="88" x2="280" y2="108" stroke="#2b6cb0" stroke-width="1.5"/>
    <!-- Departments -->
    <rect x="12" y="108" width="56" height="22" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="40" y="123" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">PM部</text>
    <rect x="76" y="108" width="56" height="22" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="104" y="123" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">開発部</text>
    <rect x="140" y="108" width="56" height="22" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="168" y="123" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">マーケ部</text>
    <rect x="204" y="108" width="56" height="22" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="232" y="123" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">営業部</text>
    <rect x="268" y="108" width="56" height="22" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="296" y="123" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">企画部</text>
    <!-- QA -->
    <line x1="160" y1="130" x2="160" y2="146" stroke="#c05621" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="120" y="146" width="80" height="22" rx="4" fill="#fff3e0" stroke="#c05621" stroke-width="1"/>
    <text x="160" y="161" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c05621">品質管理</text>
  </g>
  <!-- Divider -->
  <line x1="380" y1="30" x2="380" y2="180" stroke="#d8d5ce" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- koumei side -->
  <g transform="translate(400, 15)">
    <text x="140" y="16" text-anchor="middle" font-family="serif" font-size="14" fill="#1a1a1a" font-weight="bold">koumei</text>
    <!-- Koumei -->
    <rect x="100" y="28" width="80" height="26" rx="5" fill="#2b6cb0"/>
    <text x="140" y="46" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">孔明</text>
    <line x1="140" y1="54" x2="140" y2="66" stroke="#999" stroke-width="1"/>
    <!-- Analyst -->
    <rect x="100" y="66" width="80" height="20" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="140" y="80" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">分析</text>
    <line x1="140" y1="86" x2="140" y2="94" stroke="#999" stroke-width="1"/>
    <!-- Design parallel -->
    <line x1="140" y1="94" x2="80" y2="100" stroke="#999" stroke-width="1"/>
    <line x1="140" y1="94" x2="200" y2="100" stroke="#999" stroke-width="1"/>
    <rect x="40" y="100" width="80" height="20" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="80" y="114" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">UX設計</text>
    <rect x="160" y="100" width="80" height="20" rx="4" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1"/>
    <text x="200" y="114" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2b6cb0">技術設計</text>
    <!-- Merge -->
    <line x1="80" y1="120" x2="140" y2="132" stroke="#999" stroke-width="1"/>
    <line x1="200" y1="120" x2="140" y2="132" stroke="#999" stroke-width="1"/>
    <!-- Review -->
    <rect x="100" y="132" width="80" height="20" rx="4" fill="#fff3e0" stroke="#c05621" stroke-width="1"/>
    <text x="140" y="146" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c05621">レビュー</text>
    <line x1="140" y1="152" x2="140" y2="160" stroke="#999" stroke-width="1"/>
    <!-- Implement -->
    <rect x="100" y="160" width="80" height="20" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
    <text x="140" y="174" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2e7d32">実装</text>
  </g>
</svg>
