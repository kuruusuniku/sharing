<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 140">
  <rect width="700" height="140" fill="#f8f7f5" rx="6"/>
  <!-- 4 tip cards -->
  <g transform="translate(40, 20)">
    <!-- Card 1: Verify -->
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#fff" stroke="#e0ddd8" stroke-width="1"/>
    <circle cx="70" cy="32" r="16" fill="#ebf4ff" stroke="#2b6cb0" stroke-width="1.5"/>
    <text x="70" y="37" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#2b6cb0">&#10003;</text>
    <text x="70" y="68" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="bold">検証させる</text>
    <text x="70" y="84" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">テストで自己確認</text>
  </g>
  <g transform="translate(195, 20)">
    <!-- Card 2: Plan -->
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#fff" stroke="#e0ddd8" stroke-width="1"/>
    <circle cx="70" cy="32" r="16" fill="#fff3e0" stroke="#c05621" stroke-width="1.5"/>
    <text x="70" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#c05621">&#9998;</text>
    <text x="70" y="68" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="bold">計画してから</text>
    <text x="70" y="84" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">調査→計画→実装</text>
  </g>
  <g transform="translate(350, 20)">
    <!-- Card 3: Context -->
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#fff" stroke="#e0ddd8" stroke-width="1"/>
    <circle cx="70" cy="32" r="16" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="70" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#2e7d32">&#128269;</text>
    <text x="70" y="68" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="bold">具体的に伝える</text>
    <text x="70" y="84" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">ファイル名・条件を指定</text>
  </g>
  <g transform="translate(505, 20)">
    <!-- Card 4: Clear -->
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#fff" stroke="#e0ddd8" stroke-width="1"/>
    <circle cx="70" cy="32" r="16" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
    <text x="70" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#c62828">&#8635;</text>
    <text x="70" y="68" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="bold">/clear する</text>
    <text x="70" y="84" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">コンテキスト管理</text>
  </g>
</svg>
